<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定 - OCR Word Card</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 32px;
      width: 420px;
    }
    h1 { font-size: 20px; color: #4a9eff; margin-bottom: 8px; }
    p { font-size: 13px; color: #888; margin-bottom: 24px; line-height: 1.5; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 8px; }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      font-family: monospace;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #4a9eff; }
    .actions { display: flex; gap: 10px; }
    button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    #btn-save { background: #4a9eff; color: #fff; font-weight: 600; }
    #btn-clear { background: #2a2a4a; color: #aaa; }
    #status {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }
    .success { color: #4caf50; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚙️ 設定</h1>
    <p>輸入你的 Claude API Key 以啟用翻譯功能。<br>Key 僅儲存在本機瀏覽器中，不會上傳。</p>
    <label for="api-key">Claude API Key</label>
    <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">
    <div class="actions">
      <button id="btn-save">儲存</button>
      <button id="btn-clear">清除</button>
    </div>
    <div id="status"></div>
  </div>
  <script src="settings.js"></script>
</body>
</html>
